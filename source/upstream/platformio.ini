; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
board = esp32dev

[env:esp32c3]
board = adafruit_qtpy_esp32c3
upload_protocol = esptool
upload_flags =
  --before
  no_reset
  --after
  no_reset


[env]
platform = espressif32@6.10.0
platform_packages =
	platformio/framework-arduinoespressif32@3.20017.241212+sha.dcc1105b


build_unflags = -std=gnu++11
build_flags = -std=gnu++2a -D ARDUINO_LOOP_STACK_SIZE=6096 -O3 -D ARDUINO_GFX_NO_PERIMAN -DDEBUG_ESP_DNS

framework = arduino
build_type = release
board_build.sdkconfig = sdkconfig.defaults
board_build.partitions = custom_partition.csv
board_build.filesystem = spiffs
upload_port = /dev/ttyUSB*
monitor_port = /dev/ttyUSB*
monitor_speed = 115200
upload_speed = 921600


monitor_filters = esp32_exception_decoder, log2file, default
lib_deps =
	knolleary/PubSubClient@^2.8
	efwob/ESPPubSubClientWrapper@^1.0.2
	sparkfun/SparkFun SCD4x Arduino Library@^1.1.2
	adafruit/Adafruit GFX Library@^1.11.11
	adafruit/Adafruit GC9A01A@^1.1.0
	lowpowerlab/BMP180
	https://github.com/intuibase/esp32_utilities.git@1.0.0+sha.2d99f9e
