	<script type='text/javascript'>
		var intervalID;
		var consoleLog = false;
		var lastLoadedStatus;

		$(document).ready(function () {
			$(".dropdown-item, ul > li").each(function () {
				$(this).on("click", function () {
					clearMainContainer();
					if (typeof $(this).attr("data-page") !== 'undefined') {
						$("#maincontainer").load($(this).attr("data-page") + ".html");
					} else {
					}
				});
			});
			mainScreen();
		});

		function about() {
			clearMainContainer();
			$("#maincontainer").load("about.html");
		}

		function mainScreen() {
			clearMainContainer();
			showMainPage();

			intervalID = setInterval(function () {
				showMeterState();
			}, 5000);
		}

		function clearMainContainer() {
			if (intervalID) {
				clearInterval(intervalID);
			}
			var maincontainer = document.getElementById('maincontainer');
			maincontainer.innerHTML = "";
		}

		function showMainPage() {
			var maincontainer = document.getElementById('maincontainer');

			var mainColElement = document.createElement('div');
			mainColElement.classList.add('flex-column');
			mainColElement.classList.add('d-flex');
			mainColElement.classList.add('justify-content-between');
			mainColElement.classList.add('align-items-center');
			mainColElement.classList.add('mt-4');

			var form = document.createElement('form');
			form.setAttribute('id', 'dynamicForm');
			form.classList.add('mt-3');
			mainColElement.append(form);

			var formDht22 = document.createElement('form');
			formDht22.setAttribute('id', 'dht22Form');
			formDht22.classList.add('mt-3');
			mainColElement.append(formDht22);

			var form = document.createElement('form');
			form.setAttribute('id', 'ds18b20Form');
			form.classList.add('mt-3');
			mainColElement.append(form);

			mainColElement.innerHTML = `
<div id="gauge-container" style="width:340px; margin:auto;">
  <svg id="co2gauge" width="320" height="320" viewBox="0 0 320 320">
    <circle cx="160" cy="160" r="150" fill="#111" stroke="#000" stroke-width="4"/>
    <g id="ticks"></g>
	<image x="136" y="56"  href="img/co2_h32.bmp"/>
    <text id="co2val" x="160" y="160" text-anchor="middle" font-size="64" fill="#fff" font-family="Arial" font-weight="bold">----</text>
    <text x="160" y="190" text-anchor="middle" font-size="18" fill="#fff" font-family="Arial">ppm</text>
	<image x="60" y="205" width="12" height="16" href="img/temp_8x16.bmp"/>
	<text id="temp" x="80" y="220" font-size="18" fill="#ffb300" font-family="Arial">--°C</text>

	<text id="hum" x="240" y="220" font-size="18" fill="#4fc3f7" font-family="Arial" text-anchor="end">--%</text>
	<image x="250" y="205" width="12" height="16" href="img/humidity_12x16.bmp"/>
	<image x="90" y="225" width="16" height="16" href="img/pressure_16x16.bmp"/>
	<text id="press" x="160" y="240" text-anchor="middle" font-size="18" fill="#fff" font-family="Arial">---- hPa</text>
    <text id="datetime" x="160" y="265" text-anchor="middle" font-size="16" fill="#fff" font-family="Arial">--.--.---- --:--:--</text>
  </svg>
</div>
<div class="d-flex justify-content-center mt-3 mb-5">
  <button class="btn btn-primary" onclick="calibrate()">Calibrate CO2 Sensor</button>
</div>
`;

			maincontainer.innerHTML = "";
			maincontainer.append(mainColElement);

			showMeterState();
		}
		function calibrate() {
			if (confirm("Calibrating CO2 sensor...\nMake sure there is fresh air (400ppm) around the sensor for at least 5 minutes before clicking OK.\n\nClick OK to start calibration.")) {
				fetch(hostName + "/config/calibrate", {
					method: "POST"
				});
			}
		}
		function showMeterState() {
			fetch(hostName + '/status')
				.then(res => res.json())
				.then((out) => {
					jsonData = out;
					updateGauge(jsonData['air-sensor']);
				});
		}

		function updateGauge(d) {
			document.getElementById('co2val').textContent = d.co2ppm;
			document.getElementById('temp').textContent = `${d.temperature.toFixed(1)}°C`;
			document.getElementById('hum').textContent = `${d.humidity.toFixed(0)}%`;
			document.getElementById('press').textContent = `${d.pressure.toFixed(1)} hPa`;
			const now = new Date();
			const pad = n=>n.toString().padStart(2,'0');
			document.getElementById('datetime').textContent = `${pad(now.getDate())}-${pad(now.getMonth()+1)}-${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
			drawTicks(d.co2ppm);
		}

		const co2range = [600, 1000, 1200, 1600, 2000];
		const co2rangeColor = [
			"#00e676",      // GC9A01A_GREEN
			"#b2ff59",      // GC9A01A_GREENYELLOW
			"#fff176",      // GC9A01A_YELLOW
			"#ff9800",      // tft_.color565(230, 138, 0)
			"#ff1744"       // GC9A01A_RED
		];

		function getCo2Color(ppm) {
			if (ppm < co2range[0]) return co2rangeColor[0];
			if (ppm < co2range[1]) return co2rangeColor[1];
			if (ppm < co2range[2]) return co2rangeColor[2];
			if (ppm < co2range[3]) return co2rangeColor[3];
			return co2rangeColor[4];
		}

		function drawTicks(ppm) {
			const ticks = document.getElementById('ticks');
			ticks.innerHTML = '';
			const total = 120;
			var color = getCo2Color(ppm);
			for(let i=0; i<total; i++) {
				const angle = (i/total)*2*Math.PI;
				const r1 = 135, r2 = 149;
				const x1 = 160 + r1*Math.cos(angle-Math.PI/2);
				const y1 = 160 + r1*Math.sin(angle-Math.PI/2);
				const x2 = 160 + r2*Math.cos(angle-Math.PI/2);
				const y2 = 160 + r2*Math.sin(angle-Math.PI/2);
				const line = document.createElementNS('http://www.w3.org/2000/svg','line');
				line.setAttribute('x1',x1); line.setAttribute('y1',y1);
				line.setAttribute('x2',x2); line.setAttribute('y2',y2);
				line.setAttribute('stroke', color);
				line.setAttribute('stroke-width', 2);
				ticks.appendChild(line);
			}
		}

		function updateForm(jsonData, formName) {
			const form = document.getElementById(formName);
			form.innerHTML = '';

			for (const [key, value] of Object.entries(jsonData)) {
				const formGroup = document.createElement('div');
				formGroup.className = 'mb-3';

				const label = document.createElement('label');
				label.className = 'form-label';
				label.innerText = key.replace('_', ' ').toUpperCase();
				formGroup.appendChild(label);

				const input = document.createElement('input');
				input.className = 'form-control';
				input.id = key;
				input.name = key;
				input.value = value;
				formGroup.appendChild(input);

				form.appendChild(formGroup);
			}
		}
	</script>
